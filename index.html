<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant WebUI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
        }
        .container {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        h1 { margin-top: 0; }
        .status {
            margin: 20px 0;
            padding: 10px;
            border-radius: 6px;
            background: #333;
            font-weight: bold;
        }
        .status.connected { background: #2e7d32; }
        .status.disconnected { background: #c62828; }
        
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin: 10px;
        }
        button:hover { background-color: #45a049; }
        button:active { transform: scale(0.95); }
        button.stop { background-color: #f44336; }
        button.stop:hover { background-color: #da190b; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        
        #bargeInBtn {
            background-color: #ff9800;
        }
        #bargeInBtn:hover {
            background-color: #e68a00;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Voice Interface</h1>
    <div id="statusBox" class="status disconnected">Status: Disconnected</div>
    
    <div>
        <label for="wsUrl">Server URL:</label><br>
        <input type="text" id="wsUrl" value="ws://127.0.0.1:8765" style="width: 80%; padding: 8px; margin: 10px 0; border-radius: 4px; border: 1px solid #555; background: #222; color: white;">
    </div>

    <button id="connectBtn">Connect & Start Mic</button>
    <button id="disconnectBtn" class="stop" disabled>Disconnect</button>
    <br>
    <button id="bargeInBtn" disabled>Interrupt AI (Barge-in)</button>
</div>

<script>
    let ws;
    let mediaRecorder;
    let audioStream;
    let currentAudioChunks = [];
    let currentAudioPlayback = null;

    const statusBox = document.getElementById('statusBox');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const bargeInBtn = document.getElementById('bargeInBtn');
    const wsUrlInput = document.getElementById('wsUrl');

    connectBtn.onclick = async () => {
        try {
            // 1. Request Microphone access first
            audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // 2. Connect WebSocket
            ws = new WebSocket(wsUrlInput.value);
            
            ws.onopen = () => {
                statusBox.textContent = "Status: Connected & Listening";
                statusBox.className = "status connected";
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                bargeInBtn.disabled = false;

                // 3. Start sending audio data
                mediaRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm' });
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0 && ws.readyState === WebSocket.OPEN) {
                        ws.send(event.data);
                    }
                };
                mediaRecorder.start(250); // Send audio chunks every 250ms
            };

            ws.onmessage = async (event) => {
                if (typeof event.data === "string") {
                    // It's a JSON command (tts_start / tts_end)
                    const data = JSON.parse(event.data);
                    if (data.type === "tts_start") {
                        currentAudioChunks = []; // Clear buffer for new sentence
                    } else if (data.type === "tts_end") {
                        // Play the accumulated sentence
                        const blob = new Blob(currentAudioChunks, { type: 'audio/mpeg' });
                        const url = URL.createObjectURL(blob);
                        
                        // Stop previous audio if it's still playing
                        if (currentAudioPlayback) {
                            currentAudioPlayback.pause();
                        }
                        
                        currentAudioPlayback = new Audio(url);
                        currentAudioPlayback.play().catch(e => console.error("Audio playback error:", e));
                    }
                } else {
                    // It's binary data (TTS MP3 audio chunks)
                    currentAudioChunks.push(event.data);
                }
            };

            ws.onclose = () => {
                disconnect();
                statusBox.textContent = "Status: Disconnected";
                statusBox.className = "status disconnected";
            };

            ws.onerror = (error) => {
                console.error("WebSocket Error:", error);
                statusBox.textContent = "Status: Connection Error";
                statusBox.className = "status disconnected";
                disconnect();
            };

        } catch (err) {
            console.error("Error accessing microphone:", err);
            statusBox.textContent = "Status: Mic Access Denied/Error";
            alert("Could not access microphone. Ensure you are on localhost or HTTPS.");
        }
    };

    const disconnect = () => {
        if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
        if (audioStream) audioStream.getTracks().forEach(track => track.stop());
        if (ws) ws.close();
        if (currentAudioPlayback) currentAudioPlayback.pause();
        
        connectBtn.disabled = false;
        disconnectBtn.disabled = true;
        bargeInBtn.disabled = true;
    };

    disconnectBtn.onclick = disconnect;

    bargeInBtn.onclick = () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            // Tell the server to stop the TTS queue
            ws.send(JSON.stringify({ type: "barge_in" }));
            // Stop local playback immediately
            if (currentAudioPlayback) {
                currentAudioPlayback.pause();
                currentAudioPlayback = null;
            }
        }
    };
</script>
</body>
</html>
